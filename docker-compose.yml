services:
  api:
    build: .
    container_name: secure-api
    ports:
      - "8000:8000"

  prometheus:
    image: prom/prometheus:latest
    container_name: secure-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api